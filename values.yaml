replicaCount: 1

image:
  repository: registry.digitalocean.com/mi-registro/microservice
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 3000

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "250m"

env:
  NODE_ENV: production
  SERVICE_VERSION: "1.0.0"

imagePullSecret: docker-registry-secret