apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-microservice
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<TU_USUARIO>/k8s-microservice.git
    targetRevision: main
    path: k8s-microservice
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
